project: PrivSAF
purpose: experiment expansion requested after round-2 local review
status: five-dataset evaluation plus optional expansion checklist

privacy:
  mechanism: piecewise mechanism PM-LDP
  epsilon_is: per scalar report / per frame
  epsilon_grid: [2.0, 4.0]
  sequence_note: sequence-level privacy requires composition over contributed frames

datasets:
  - id: air_quality
    role: verified anchor
    source: https://archive.ics.uci.edu/dataset/360/air+quality
    local_status: run
    targets: ["C6H6(GT)", "CO(GT)", "NO2(GT)"]
    split: chronological 60/20/20
  - id: household_power
    role: dense energy stream
    source: https://archive.ics.uci.edu/dataset/235/individual+household+electric+power+consumption
    local_status: downloaded
    targets: ["Global_active_power", "Voltage"]
    split: chronological 60/20/20
  - id: bike_sharing
    role: seasonal count stream
    source: https://archive.ics.uci.edu/dataset/275/bike+sharing+dataset
    local_status: downloaded
    targets: ["cnt", "temp", "hum"]
    split: chronological 60/20/20
  - id: beijing_air
    role: multi-station environmental stream
    source: https://archive.ics.uci.edu/dataset/501/beijing+multi+site+air+quality+data
    local_status: downloaded
    targets: ["PM2.5", "TEMP", "WSPM"]
    split: 2013-2015 train, 2016 validation, 2017 test
  - id: nab
    role: benchmark scalar time series
    source: https://github.com/numenta/NAB
    local_status: downloaded
    targets: ["machine_temperature", "ambient_temperature", "occupancy"]
    split: per-file chronological 60/20/20

fault_modes:
  iid_stuck:
    measured: true
    rate: [0.20]
    stuck_values: [q05, q95]
  segment_stuck:
    measured: true
    rate: [0.20]
    stuck_values: [q05, q95]
    segment_length: [48]
  additive_bias:
    measured: true
    rate: [0.20]
    bias: [0.35]
  gradual_drift:
    measured: false
    max_drift: [0.1, 0.25, 0.5]
    segment_length: [32, 64, 128]
  dropout:
    measured: false
    rate: [0.05, 0.10, 0.20]
    segment_length: [4, 16, 64]
  saturation:
    measured: false
    rails: [2, 3, 5]

baselines:
  raw_domain_upper_bound:
    - raw_nonprivate_hmm
    - raw_hampel
    - raw_cusum
    - raw_bocpd
    - raw_rolling_median
  privatized_domain:
    - privatized_zscore
    - privatized_rolling_median
  privacy_aware:
    - ldp_distribution_surprise
    - privsaf_mixture
    - privsaf_hmm

repair_methods:
  - no_repair
  - linear_interpolation
  - locf
  - rolling_median
  - privsaf_repair

outputs:
  logs:
    - results/icde_revision_detection_runs.csv
    - results/icde_revision_detection_summary.csv
    - results/icde_revision_repair_runs.csv
    - results/icde_revision_repair_summary.csv
    - results/icde_revision_theory_diagnostics.csv
    - results/icde_revision_metadata.json
    - results/expanded_runs.csv
    - results/expanded_summary.csv
    - results/model_selection.csv
    - results/budget_estimation.csv
  figures:
    - results/fig_icde_revision_baselines.png
    - results/fig_icde_revision_repair.png
    - results/fig_dataset_gap_coverage.png
    - results/fig_fault_taxonomy_examples.png
    - results/fig_expected_metric_trends.png
    - results/fig_model_selection_expectation.png
    - results/fig_budget_estimation_plan.png
